<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrAnime Clone - Recherche & Lecture Auto</title>
    
    <style>
        :root {
            --bg-body: #111217;
            --bg-card: #181922;
            --bg-input: #20222e;
            --text-main: #ffffff;
            --text-muted: #babbc3;
            --accent: #ff4a5a;
            --border: #2a2d3d;
        }

        [data-theme="light"] {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-input: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent: #dc2626;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--accent);
        }

        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 500; }
        .nav-links a.active { color: var(--accent); }
        .theme-btn { background: var(--bg-input); border: none; font-size: 20px; padding: 8px; border-radius: 50%; cursor: pointer; }

        .container { max-width: 1200px; width: 100%; margin: 30px auto; padding: 0 20px; flex-grow: 1; }
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 40px; }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h2 { font-size: 20px; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* BARRE DE RECHERCHE */
        .search-bar {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            width: 250px;
            transition: border-color 0.3s, width 0.3s;
        }
        .search-bar:focus {
            border-color: var(--accent);
            width: 300px;
        }

        /* LECTEUR */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #video-player { width: 100%; height: 100%; object-fit: contain; }

        /* LISTE EPISODES */
        .episodes-box { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; max-height: 450px; display: flex; flex-direction: column; }
        .episodes-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .episodes-list::-webkit-scrollbar { width: 6px; }
        .episodes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .episode-btn {
            width: 100%; text-align: left; padding: 12px; background-color: var(--bg-input); border: 1px solid transparent;
            border-radius: 6px; color: var(--text-main); font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .episode-btn:hover, .episode-btn.active { background-color: var(--accent); color: #ffffff; }
        .episode-btn .sub-text { display: block; font-size: 11px; opacity: 0.6; margin-top: 2px; }

        /* GRILLE ANIMES */
        .anime-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        
        .anime-card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .anime-card:hover { transform: translateY(-5px); }
        .anime-card.hidden { display: none; } /* Pour masquer lors de la recherche */
        
        .card-img { position: relative; width: 100%; aspect-ratio: 2 / 3; background-color: var(--bg-input); }
        .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-badge { position: absolute; bottom: 10px; left: 10px; background-color: var(--accent); color: #ffffff; padding: 4px 8px; font-size: 11px; border-radius: 4px; font-weight: bold; }
        .anime-card h3 { font-size: 14px; padding: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        footer { text-align: center; padding: 20px; background-color: var(--bg-card); border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; margin-top: 40px; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .navbar { flex-direction: column; gap: 12px; } .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } .search-bar { width: 100%; } .search-bar:focus { width: 100%; } }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">FrAnime<span>Clone</span></div>
        <div class="nav-right">
            <nav class="nav-links">
                <a href="#" class="active">Accueil</a>
                <a href="#">Animes</a>
                <a href="#">Films</a>
            </nav>
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </div>
    </header>

    <main class="container">
        <div class="main-layout">
            
            <!-- LECTEUR VIDEO -->
            <div class="player-area">
                <h2>Lecteur Vidéo</h2>
                <div class="video-player-wrapper">
                    <video id="video-player" src="videos/episode1.mp4" controls preload="auto"></video>
                </div>
                <div id="current-episode-title" class="episode-title" style="margin-top: 12px; color: var(--accent); font-size: 18px; font-weight: 600;">Épisode 1 : Le Commencement</div>
            </div>

            <!-- STRUCTURE EPISODES -->
            <div class="episodes-box">
                <h2>Épisodes</h2>
                <div id="episodes-container" class="episodes-list">
                    <!-- Inséré dynamiquement -->
                </div>
            </div>
        </div>

        <!-- SECTION GRILLE AVEC FILTRE -->
        <section>
            <div class="section-header">
                <h2>Animes Disponibles</h2>
                <!-- Input de Recherche -->
                <input type="text" id="search-anime" class="search-bar" placeholder="Rechercher un anime...">
            </div>
            <div id="anime-container-grid" class="anime-grid">
                <!-- Inséré dynamiquement -->
            </div>
        </section>
    </main>

    <footer>&copy; 2026 FrAnimeClone - Recherche Intelligente & Autoplay.</footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- 1. DONNÉES DE BASE ---
            const listeAnimes = [
                { titre: "Demon Slayer", image: "images/demon-slayer.WEBP", badge: "Saison 2" },
                { titre: "One Piece", image: "images/one-piece.WEBP", badge: "Ép. 1050" },
                { titre: "Jujutsu Kaisen", image: "images/jujutsu.WEBP", badge: "Film" },
                { titre: "Chainsaw Man", image: "images/chainsaw.WEBP", badge: "Ép. 12" },
                { titre: "Attack on Titan", image: "images/aot.WEBP", badge: "Final" },
                { titre: "Naruto Shippuden", image: "images/naruto.WEBP", badge: "Complet" }
            ];

            const listeEpisodes = [
                { id: "01", fichier: "videos/episode1.mp4", titre: "Épisode 1 : Le Commencement" },
                { id: "02", fichier: "videos/episode2.mp4", titre: "Épisode 2 : L'Éveil des Pouvoirs" },
                { id: "03", fichier: "videos/episode3.mp4", titre: "Épisode 3 : Le Premier Combat" }
            ];

            // --- 2. AFFICHAGE DES ANIMES ET LOGIQUE DE RECHERCHE ---
            const gridContainer = document.getElementById("anime-container-grid");
            const searchInput = document.getElementById("search-anime");
            let animeCardsReferences = []; // Stocke les références pour le filtrage rapide

            listeAnimes.forEach(anime => {
                const card = document.createElement("div");
                card.className = "anime-card";
                card.innerHTML = `
                    <div class="card-img">
                        <img src="${anime.image}" alt="${anime.titre}" onerror="this.src='placeholder.com'">
                        <span class="card-badge">${anime.badge}</span>
                    </div>
                    <h3>${anime.titre}</h3>
                `;
                gridContainer.appendChild(card);
                
                // Garder en mémoire l'élément et le titre en minuscule pour la recherche
                animeCardsReferences.push({
                    element: card,
                    titre: anime.titre.toLowerCase()
                });
            });

            // Événement de saisie dans la barre de recherche
            searchInput.addEventListener("input", (e) => {
                const valeurRecherche = e.target.value.toLowerCase().trim();
                
                animeCardsReferences.forEach(item => {
                    if (item.titre.includes(valeurRecherche)) {
                        item.element.classList.remove("hidden"); // Affiche la carte
                    } else {
                        item.element.classList.add("hidden");    // Masque la carte
                    }
                });
            });

            // --- 3. RENDU DES BOUTONS D'ÉPISODES ---
            const episodesContainer = document.getElementById("episodes-container");
            const video = document.getElementById("video-player");
            const currentTitle = document.getElementById("current-episode-title");

            listeEpisodes.forEach((ep, index) => {
                const btn = document.createElement("button");
                btn.className = `episode-btn ${index === 0 ? 'active' : ''}`;
                btn.setAttribute("data-index", index); // Index pour retrouver l'épisode suivant facilement
                btn.innerHTML = `
                    Épisode ${ep.id}
                    <span class="sub-text">VOSTFR - Fichier Local</span>
                `;
                episodesContainer.appendChild(btn);
            });

            const buttons = document.querySelectorAll(".episode-btn");

            // --- 4. FONCTION COMMUNE DE LECTURE D'UN ÉPISODE ---
            function chargerEpisode(indexBtn) {
                if(indexBtn >= listeEpisodes.length) return; // Plus d'épisodes disponibles

                const cible = listeEpisodes[indexBtn];
                
                video.pause();
                video.removeAttribute("src");
                video.load(); 

                video.src = cible.fichier;
                currentTitle.textContent = cible.titre;

                buttons.forEach(btn => btn.classList.remove("active"));
                buttons[indexBtn].classList.add("active");

                video.load();
                video.play().catch(() => {
                    console.log("Lecture automatique bloquée par les règles de sécurité du navigateur.");
                });
            }

            // Gestion du clic manuel sur la liste d'épisodes
            buttons.forEach(button => {
                button.addEventListener("click", () => {
                    const idx = parseInt(button.getAttribute("data-index"));
                    chargerEpisode(idx);
                });
            });

            // --- 5. LOGIQUE DE LECTURE AUTOMATIQUE (AUTOPLAY SUIVANT) ---
            video.addEventListener("ended", () => {
                // Trouver le bouton actuellement actif
                const boutonActif = document.querySelector(".episode-btn.active");
                if (boutonActif) {
                    const indexActuel = parseInt(boutonActif.getAttribute("data-index"));
                    const indexSuivant = indexActuel + 1;

                    // S'il y a un épisode après, on le charge automatiquement
                    if (indexSuivant < listeEpisodes.length) {
                        chargerEpisode(indexSuivant);
                    } else {
                        alert("Vous avez terminé le dernier épisode disponible !");
                    }
                }
            });

            // --- 6. BOUTON THEME SOMBRE/LUMINEUX ---
            const themeToggleBtn = document.getElementById("theme-toggle");
            themeToggleBtn.addEventListener("click", () => {
                if (document.documentElement.getAttribute("data-theme") === "light") {
                    document.documentElement.removeAttribute("data-theme");
                    themeToggleBtn.textContent = "🌙";
                } else {
                    document.documentElement.setAttribute("data-theme", "light");
                    themeToggleBtn.textContent = "☀️";
                }
            });
        });
    </script>
</body>
</html>
